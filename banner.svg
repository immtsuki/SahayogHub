<svg width="900" height="180" viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f2e"/>
      <stop offset="50%" style="stop-color:#0d1b4b"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="180" fill="url(#bg)" rx="12"/>

  <!-- Animated grid lines -->
  <g opacity="0.08" stroke="#00e5ff" stroke-width="0.5">
    <line x1="0" y1="30" x2="900" y2="30"/><line x1="0" y1="60" x2="900" y2="60"/>
    <line x1="0" y1="90" x2="900" y2="90"/><line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="150" y1="0" x2="150" y2="180"/><line x1="300" y1="0" x2="300" y2="180"/>
    <line x1="450" y1="0" x2="450" y2="180"/><line x1="600" y1="0" x2="600" y2="180"/>
    <line x1="750" y1="0" x2="750" y2="180"/>
  </g>

  <!-- Glowing orb left -->
  <circle cx="80" cy="90" r="45" fill="#00e5ff" opacity="0.04" filter="url(#softglow)">
    <animate attributeName="opacity" values="0.04;0.09;0.04" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- Glowing orb right -->
  <circle cx="820" cy="90" r="45" fill="#00b4d8" opacity="0.04" filter="url(#softglow)">
    <animate attributeName="opacity" values="0.04;0.09;0.04" dur="4s" begin="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Cyan accent line top -->
  <rect x="0" y="0" width="900" height="3" rx="2" fill="url(#cyan)" opacity="0.9"/>
  <!-- Cyan accent line bottom -->
  <rect x="0" y="177" width="900" height="3" rx="2" fill="url(#cyan)" opacity="0.4"/>

  <!-- Animated pulse dot left -->
  <circle cx="32" cy="90" r="4" fill="#00e5ff" filter="url(#glow)">
    <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Animated pulse dot right -->
  <circle cx="868" cy="90" r="4" fill="#00e5ff" filter="url(#glow)">
    <animate attributeName="r" values="4;7;4" dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Handshake emoji area -->
  <text x="450" y="58" font-size="32" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, sans-serif">🤝</text>

  <!-- Main title with gradient fill via clip -->
  <text x="450" y="105" font-size="42" font-weight="900" text-anchor="middle"
        font-family="'Segoe UI', 'Arial Black', sans-serif" letter-spacing="2"
        fill="url(#cyan)" filter="url(#glow)">
    SahayogHub
  </text>

  <!-- Subtitle -->
  <text x="450" y="138" font-size="15" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif" fill="#7ecfff" letter-spacing="4" opacity="0.85">
    ONE CLICK SOLUTIONS · YOUR COMMUNITY, UNIFIED
  </text>

  <!-- Corner brackets - top left -->
  <polyline points="10,25 10,10 25,10" stroke="#00e5ff" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Corner brackets - top right -->
  <polyline points="890,25 890,10 875,10" stroke="#00e5ff" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Corner brackets - bottom left -->
  <polyline points="10,155 10,170 25,170" stroke="#00e5ff" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Corner brackets - bottom right -->
  <polyline points="890,155 890,170 875,170" stroke="#00e5ff" stroke-width="2" fill="none" opacity="0.6"/>
</svg>
